<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Hack Club</title>
    <style>
        html { height: 100%; }
        body { 
            margin: 0; 
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg {
            animation: slide 3s ease-in-out infinite alternate;
            background-image: linear-gradient(-60deg, #6c3 50%, #09f 50%);
            bottom: 0; left: -50%; opacity: .5;
            position: fixed; right: -50%; top: 0; z-index: -1;
        }
        .bg2 { animation-direction: alternate-reverse; animation-duration: 4s; }
        .bg3 { animation-duration: 5s; }

        @keyframes slide {
            0% { transform: translateX(-25%); }
            100% { transform: translateX(25%); }
        }

        .content {
            background-color: #dfdfdf;
            border: 4px solid #fff;
            border-right: 4px solid #555;
            border-bottom: 4px solid #555;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.2);
            padding: 30px;
            margin-top: 140px;
            margin-bottom: 40px;
            text-align: center;
            max-width: 850px; 
            width: 95%;
            z-index: 1;
        }

        h1 { 
            margin-top: 0; 
            color: #000; 
            font-size: 2.8rem;
            text-transform: uppercase;
            background: #000080;
            color: white;
            padding: 5px;
            letter-spacing: 2px;
        }

        .controls { margin-bottom: 30px; display: flex; gap: 15px; justify-content: center; }
        
        .btn-ui {
            padding: 10px 20px;
            cursor: pointer;
            background: #c0c0c0;
            border: 2px solid #fff;
            border-right: 2px solid #000;
            border-bottom: 2px solid #000;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            transition: none;
        }

        .btn-ui:active { 
            border: 2px solid #000;
            border-right: 2px solid #fff;
            border-bottom: 2px solid #fff;
            padding: 11px 19px 9px 21px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 15px;
            margin: 20px auto;
            max-width: 800px;
        }

        .tile {
            aspect-ratio: 1/1;
            background: #c0c0c0;
            border: 4px solid #fff;
            border-right: 4px solid #000;
            border-bottom: 4px solid #000;
            cursor: pointer;
            font-size: 3.5rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            color: #333;
        }

        .tile.flipped {
            background: #fff;
            border: 4px solid #808080;
            border-right: 4px solid #dfdfdf;
            border-bottom: 4px solid #dfdfdf;
        }

        .tile.matched {
            visibility: hidden;
            pointer-events: none;
        }

        footer {
            margin-top: auto;
            padding: 25px;
            font-weight: bold;
            color: #000;
            z-index: 1;
            font-size: 1.3rem;
            background: #c0c0c0;
            width: 100%;
            text-align: center;
            border-top: 4px solid #fff;
            box-shadow: 0 -4px 0 #808080;
        }

        @media (max-width: 768px) {
            .game-grid { grid-template-columns: repeat(3, 1fr); }
            .tile { font-size: 2.5rem; }
        }

        @media (max-width: 480px) {
            .game-grid { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>

    <a href="https://hackclub.com/">
        <img style="position: absolute; top: 0; left: 10px; border: 0; width: 256px; z-index: 999;" 
             src="https://assets.hackclub.com/flag-orpheus-top.svg" alt="Hack Club"/>
    </a>

    <div class="content">
        <h1>Memory Match</h1>
        
        <div class="controls">
            <button class="btn-ui" id="musicToggle">🎵 Music: OFF [M]</button>
            <button class="btn-ui" onclick="resetGame()">🔄 Reset</button>
        </div>

        <div class="game-grid" id="grid"></div>
    </div>

    <footer>Sadrita Neogi (Hack Club)</footer>

    <audio id="bgMusic" loop src="songbg.mp3"></audio>
    <audio id="clickSound" src="button.mp3"></audio>

    <script>
        const grid = document.getElementById('grid');
        const bgMusic = document.getElementById('bgMusic');
        const clickSound = document.getElementById('clickSound');
        const musicToggle = document.getElementById('musicToggle');

        let symbols = ['⭐', '🍎', '⚽', '🍕', '🎮', '🚀'];
        let gameSet = [...symbols, ...symbols]; 
        let flippedTiles = [];
        let matchedCount = 0;
        let isPlayingMusic = false;

        function toggleMusic() {
            playClick();
            if (isPlayingMusic) {
                bgMusic.pause();
                musicToggle.innerText = "🎵 Music: OFF [M]";
            } else {
                bgMusic.play().catch(e => console.log("Interaction required"));
                musicToggle.innerText = "🎵 Music: ON [M]";
            }
            isPlayingMusic = !isPlayingMusic;
        }

        musicToggle.addEventListener('click', toggleMusic);

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'm') {
                toggleMusic();
            }
        });

        function playClick() {
            clickSound.currentTime = 0;
            clickSound.play();
        }

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            grid.innerHTML = '';
            const shuffled = shuffle(gameSet);
            shuffled.forEach((symbol) => {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.dataset.symbol = symbol;
                tile.innerText = "?";
                tile.addEventListener('click', flipTile);
                grid.appendChild(tile);
            });
        }

        function flipTile() {
            if (flippedTiles.length < 2 && !this.classList.contains('flipped')) {
                playClick();
                this.classList.add('flipped');
                this.innerText = this.dataset.symbol;
                flippedTiles.push(this);

                if (flippedTiles.length === 2) {
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            const [tile1, tile2] = flippedTiles;
            if (tile1.dataset.symbol === tile2.dataset.symbol) {
                setTimeout(() => {
                    tile1.classList.add('matched');
                    tile2.classList.add('matched');
                    flippedTiles = [];
                    matchedCount += 2;
                    if (matchedCount === 12) {
                        setTimeout(() => alert("Victory! You matched all pairs!"), 300);
                    }
                }, 500);
            } else {
                setTimeout(() => {
                    tile1.classList.remove('flipped');
                    tile2.classList.remove('flipped');
                    tile1.innerText = "?";
                    tile2.innerText = "?";
                    flippedTiles = [];
                }, 800);
            }
        }

        function resetGame() {
            playClick();
            matchedCount = 0;
            flippedTiles = [];
            createBoard();
        }
// This Website is made by Sadrita Neogi 
        createBoard();
    </script>
</body>
</html>
