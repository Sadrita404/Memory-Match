<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Hack Club</title>
    <style>
        /* Background Animation Styles */
        html { height: 100%; }
        body { 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg {
            animation: slide 3s ease-in-out infinite alternate;
            background-image: linear-gradient(-60deg, #6c3 50%, #09f 50%);
            bottom: 0; left: -50%; opacity: .5;
            position: fixed; right: -50%; top: 0; z-index: -1;
        }
        .bg2 { animation-direction: alternate-reverse; animation-duration: 4s; }
        .bg3 { animation-duration: 5s; }

        @keyframes slide {
            0% { transform: translateX(-25%); }
            100% { transform: translateX(25%); }
        }

        /* Game Container */
        .content {
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            padding: 30px;
            margin-top: 140px;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
            width: 90%;
            z-index: 1;
        }

        h1 { 
            margin-top: 0; 
            color: #333; 
            font-family: monospace; 
            font-size: 2.5rem;
            text-transform: uppercase;
        }

        /* Audio Controls */
        .controls { margin-bottom: 30px; display: flex; gap: 10px; justify-content: center; }
        .btn-ui {
            padding: 12px 24px;
            cursor: pointer;
            background: #fff;
            border: 3px solid #333;
            box-shadow: 4px 4px 0px #333;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.1s;
        }
        .btn-ui:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #333; }

        /* Grid System - Optimized for 12 tiles (3x4 or 4x3) */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 15px;
            margin: 20px auto;
        }

        /* Tile Button Style - Larger and Bold */
        .tile {
            aspect-ratio: 1/1;
            background: #eee;
            border: 5px solid #333;
            border-bottom: 10px solid #333;
            border-radius: 12px;
            cursor: pointer;
            /* Massive Emoji Size */
            font-size: 3.5rem; 
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.1s, border 0.1s;
            user-select: none;
            color: #333;
        }

        .tile.flipped {
            background: #fff;
            border-bottom: 5px solid #333;
            transform: translateY(5px);
        }

        .tile.matched {
            visibility: hidden;
            pointer-events: none;
        }

        footer {
            margin-top: auto;
            padding: 20px;
            font-weight: bold;
            color: #333;
            z-index: 1;
            font-size: 1.2rem;
            background: rgba(255,255,255,0.5);
            width: 100%;
            text-align: center;
        }

        /* Responsive scaling for smaller screens */
        @media (max-width: 480px) {
            .tile { font-size: 2.5rem; }
            .game-grid { grid-template-columns: repeat(3, 1fr); }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="bg bg2"></div>
    <div class="bg bg3"></div>

    <a href="https://hackclub.com/">
        <img style="position: absolute; top: 0; left: 10px; border: 0; width: 256px; z-index: 999;" 
             src="https://assets.hackclub.com/flag-orpheus-top.svg" alt="Hack Club"/>
    </a>

    <div class="content">
        <h1>Memory Match</h1>
        
        <div class="controls">
            <button class="btn-ui" id="musicToggle">🎵 Music: OFF</button>
            <button class="btn-ui" onclick="resetGame()">🔄 Reset</button>
        </div>

        <div class="game-grid" id="grid">
            </div>
    </div>

    <footer>Sadrita Neogi (Hack Club)</footer>

    <audio id="bgMusic" loop src="songbg.mp3"></audio>
    <audio id="clickSound" src="button.mp3"></audio>

    <script>
        const grid = document.getElementById('grid');
        const bgMusic = document.getElementById('bgMusic');
        const clickSound = document.getElementById('clickSound');
        const musicToggle = document.getElementById('musicToggle');

        // 6 symbols for 12 tiles total
        let symbols = ['⭐', '🍎', '⚽', '🍕', '🎮', '🚀'];
        let gameSet = [...symbols, ...symbols]; 
        let flippedTiles = [];
        let matchedCount = 0;
        let isPlayingMusic = false;

        // Music Toggle Logic
        musicToggle.addEventListener('click', () => {
            playClick();
            if (isPlayingMusic) {
                bgMusic.pause();
                musicToggle.innerText = "🎵 Music: OFF";
            } else {
                bgMusic.play().catch(e => console.log("Audio play blocked until interaction"));
                musicToggle.innerText = "🎵 Music: ON";
            }
            isPlayingMusic = !isPlayingMusic;
        });

        // Click Sound Trigger
        function playClick() {
            clickSound.currentTime = 0;
            clickSound.play();
        }

        // Shuffle Algorithm
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        // Create the 12-tile board
        function createBoard() {
            grid.innerHTML = '';
            const shuffled = shuffle(gameSet);
            shuffled.forEach((symbol, index) => {
                const tile = document.createElement('div');
                tile.classList.add('tile');
                tile.dataset.symbol = symbol;
                tile.dataset.index = index;
                // Using a dot or question mark for the back
                tile.innerText = "?"; 
                tile.addEventListener('click', flipTile);
                grid.appendChild(tile);
            });
        }

        function flipTile() {
            // Prevent clicking more than 2 or clicking already flipped tiles
            if (flippedTiles.length < 2 && !this.classList.contains('flipped')) {
                playClick();
                this.classList.add('flipped');
                this.innerText = this.dataset.symbol;
                flippedTiles.push(this);

                if (flippedTiles.length === 2) {
                    checkMatch();
                }
            }
        }

        function checkMatch() {
            const [tile1, tile2] = flippedTiles;
            if (tile1.dataset.symbol === tile2.dataset.symbol) {
                // Match Found
                setTimeout(() => {
                    tile1.classList.add('matched');
                    tile2.classList.add('matched');
                    flippedTiles = [];
                    matchedCount += 2;
                    if (matchedCount === 12) {
                        setTimeout(() => alert("Victory! You found all pairs!"), 200);
                    }
                }, 500);
            } else {
                // No Match
                setTimeout(() => {
                    tile1.classList.remove('flipped');
                    tile2.classList.remove('flipped');
                    tile1.innerText = "?";
                    tile2.innerText = "?";
                    flippedTiles = [];
                }, 800);
            }
        }

        function resetGame() {
            playClick();
            matchedCount = 0;
            flippedTiles = [];
            createBoard();
        }

        // Initialize Board on Load
        createBoard();
    </script>
</body>
</html>
